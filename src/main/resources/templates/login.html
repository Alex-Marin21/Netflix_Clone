<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflix - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6d7434e-d6de-4185-a6d4-c77a2d08737b/RO-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Logo Pozitionat Absolut */
        .logo {
            margin-top: 25px;
            margin-left: 50px;
            color: #e50914;
            font-weight: 800;
            font-size: 40px;
            text-decoration: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .login-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 50px;
        }

        .card-netflix {
            background-color: rgba(0, 0, 0, 0.75);
            border-radius: 4px;
            padding: 60px 68px 40px;
            min-width: 450px;
            min-height: 600px;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 28px;
            font-size: 32px;
        }

        .form-control-netflix {
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            height: 50px;
            margin-bottom: 16px;
            padding: 16px 20px;
            font-size: 16px;
        }

        .form-control-netflix:focus {
            background: #454545;
            color: white;
            box-shadow: none;
            outline: none;
            border-bottom: 2px solid #e50914; /* Accent portocaliu la focus */
        }

        .form-control-netflix::placeholder {
            color: #8c8c8c;
        }

        .btn-netflix {
            background-color: #e50914;
            color: white;
            font-weight: 700;
            font-size: 16px;
            border-radius: 4px;
            padding: 16px;
            margin-top: 24px;
            width: 100%;
            border: none;
            transition: background 0.2s;
        }

        .btn-netflix:hover {
            background-color: #f40612;
        }

        .signup-text {
            color: #737373;
            font-size: 16px;
            margin-top: 16px;
        }

        .signup-text a {
            color: white;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Styling pentru alerte */
        .alert-custom {
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .alert-error { background: #e87c03; color: white; }
        .alert-info { background: #2e86de; color: white; border: none; }
        .alert-success { background: #46d369; color: black; border: none; font-weight: bold; }

        .forgot-link {
            color: #b3b3b3;
            font-size: 13px;
            text-decoration: none;
        }
        .forgot-link:hover { text-decoration: underline; color: white; }
    </style>
</head>
<body>

<a href="/" class="logo">NETFLIX CLONE</a>

<div class="login-container">
    <div class="card-netflix">
        <h2>Sign In</h2>

        <div th:if="${param.error}" class="alert-custom alert-error">
            Incorrect username or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert-custom alert-info">
            You have been logged out.
        </div>
        <div th:if="${param.resetSuccess}" class="alert-custom alert-success">
            Password updated! You can now sign in.
        </div>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <input type="text" name="username" class="form-control form-control-netflix" placeholder="Username" required autofocus />
            </div>

            <div class="mb-2">
                <input type="password" name="password" class="form-control form-control-netflix" placeholder="Password" required />
            </div>

            <div class="d-flex justify-content-end mb-3">
                <a href="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-netflix">Sign In</button>
        </form>

        <div class="signup-text">
            New to Netflix Clone? <a href="/register">Sign up now</a>.
        </div>

    </div>
</div>

</body>
</html>
