<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflix Clone - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: white;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6d7434e-d6de-4185-a6d4-c77a2d08737b/RO-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { background-color: rgba(0, 0, 0, 0.75); border: none; padding: 60px; min-width: 450px; border-radius: 4px; }
        .form-control { background-color: #333; border: none; color: white; height: 50px; margin-bottom: 20px; }
        .btn-netflix { background-color: #e50914; color: white; font-weight: bold; width: 100%; padding: 12px; margin-top: 20px; }
        .link-gray { color: #b3b3b3; text-decoration: none; font-size: 13px; }
        .link-gray:hover { text-decoration: underline; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2 class="mb-4">Sign In</h2>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
        You have been logged out successfully.
    </div>
    <div th:if="${param.resetSuccess}" class="alert alert-success">
        Password changed successfully! You can now log in.
    </div>

    <form method="post" th:action="@{/login}">
        <input type="text" name="username" class="form-control" placeholder="Username" required autofocus />
        <input type="password" name="password" class="form-control" placeholder="Password" required />

        <div class="d-flex justify-content-end mb-3">
            <a href="/forgot-password" class="text-decoration-none text-secondary small">Forgot your password?</a>
        </div>

        <button type="submit" class="btn btn-netflix">Sign In</button>
    </form>

    <div class="mt-4 text-secondary">
        New here? <a href="/register" class="text-white text-decoration-none">Sign up now</a>.
    </div>
</div>

</body>
</html>
