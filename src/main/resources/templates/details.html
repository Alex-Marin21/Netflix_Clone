<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow-x: hidden;
            /* Fundal subtil din imaginea filmului, foarte intunecat si blurat */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .details-container {
            display: flex;
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
            gap: 60px; /* Spatiu intre poster si text */
            align-items: center; /* Centrare verticala */
            padding: 40px 0;
        }

        /* POSTERUL - Netaiat, cu umbra si colturi rotunjite */
        .poster-wrapper {
            flex-shrink: 0; /* Nu lasam imaginea sa se micsoreze */
        }

        .poster-image {
            width: 350px; /* Latime fixa */
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Umbra eleganta */
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* TEXTUL - Partea dreapta */
        .info-wrapper {
            flex-grow: 1;
        }

        .movie-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .meta-data {
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            color: #dcdcdc;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .rating-badge {
            background-color: #46d369; /* Verdele de scor */
            color: black;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 15px;
        }

        .year {
            margin-right: 15px;
            border: 1px solid #777;
            padding: 2px 6px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .genres {
            font-style: italic;
            color: #a3a3a3;
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* BUTOANELE */
        .btn-container {
            display: flex;
            gap: 15px; /* Spatiu intre butoane */
        }

        .btn-play {
            background-color: #e50914; /* Rosu Netflix */
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 12px 35px;
            border-radius: 4px;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-play:hover {
            background-color: #f40612;
            transform: scale(1.05);
            color: white;
        }

        .btn-mylist {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 12px 35px;
            border-radius: 4px;
            border: none;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .btn-mylist:hover {
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .back-link {
            position: absolute;
            top: 30px;
            left: 40px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .back-link:hover { color: white; }

        /* Responsive pentru mobil */
        @media (max-width: 768px) {
            .details-container { flex-direction: column; text-align: center; }
            .poster-image { width: 250px; }
            .meta-data { justify-content: center; }
            .content { padding-left: 0; }
            .btn-container { justify-content: center; }
        }
    </style>
</head>
<body th:style="'--bg-image: url(' + ${movie.posterPath} + ');'">

<a href="/" class="back-link">← Back to Browse</a>

<div class="details-container">

    <div class="poster-wrapper">
        <img th:src="${movie.posterPath}" class="poster-image" alt="Movie Poster">
    </div>

    <div class="info-wrapper">
        <h1 class="movie-title" th:text="${movie.title}"></h1>

        <div class="meta-data">
            <span class="rating-badge" th:text="${movie.rating != null ? movie.rating : '-'}"></span>
            <span class="year" th:text="${movie.releaseDate}"></span>
            <span class="genres" th:text="${movie.genres}"></span>
        </div>

        <p class="description" th:text="${movie.description != null ? movie.description : 'No description available.'}"></p>

        <div class="btn-container">
            <a th:href="@{/watch/{id}(id=${movie.movieId})}" class="btn-play">
                ▶ Play
            </a>

            <a th:if="${isFavorite}"
               th:href="@{/mylist/remove/{id}(id=${movie.movieId})}"
               class="btn-mylist"
               style="background-color: white; color: black;">
                ✓ My List
            </a>

            <a th:unless="${isFavorite}"
               th:href="@{/mylist/add/{id}(id=${movie.movieId})}"
               class="btn-mylist">
                + My List
            </a>
        </div>
    </div>

</div>
<div class="container mt-5" style="max-width: 1200px; padding-bottom: 50px;">
    <h3 class="text-white mb-4" style="border-left: 4px solid #e50914; padding-left: 10px;">More Like This</h3>

    <div class="row">
        <div class="col-6 col-md-3" th:each="sim : ${similarMovies}">
            <div style="transition: transform 0.3s; cursor: pointer;"
                 onmouseover="this.style.transform='scale(1.05)'"
                 onmouseout="this.style.transform='scale(1)'">

                <a th:href="@{/details/{id}(id=${sim.movieId})}">
                    <img th:src="${sim.posterPath}"
                         style="width: 100%; border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);"
                         alt="Poster">
                </a>

                <p class="text-center mt-2 text-secondary small" th:text="${sim.title}"></p>
            </div>
        </div>

        <div th:if="${similarMovies.empty}" class="text-secondary ps-3">
            Nu am găsit alte filme similare momentan.
        </div>
    </div>
</div>

</body>
</html>
