<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title} + ' - Netflix Clone'">Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HERO SECTION WITH BLURRED BACKDROP --- */
        .hero-background {
            position: relative;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center top;
            min-height: 85vh;
            display: flex;
            align-items: center;
        }

        /* Gradient Overlay to fade image into black */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #141414 10%, rgba(20,20,20,0.85) 50%, rgba(20,20,20,0.4) 100%),
                        linear-gradient(to top, #141414 5%, transparent 50%);
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            padding-top: 50px;
        }

        /* --- POSTER & TEXT --- */
        .poster-image {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            transition: transform 0.3s;
        }
        .poster-image:hover { transform: scale(1.02); }

        .movie-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .meta-info {
            font-size: 1.1rem;
            color: #d2d2d2;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .match-score { color: #46d369; font-weight: bold; }
        .year-badge { border: 1px solid #777; padding: 0 5px; font-size: 0.9rem; color: #ccc; }

        .description {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #fff;
            max-width: 700px;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* --- BUTTONS --- */
        .btn-play {
            background-color: white;
            color: black;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 30px;
            border-radius: 4px;
            border: none;
            display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.2s;
        }
        .btn-play:hover { background-color: rgba(255,255,255,0.75); color: black; }

        .btn-list {
            background-color: rgba(109, 109, 110, 0.7);
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 30px;
            border-radius: 4px;
            border: none;
            display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-list:hover { background-color: rgba(109, 109, 110, 0.4); color: white; border: 1px solid white; }

        .back-btn {
            position: absolute; top: 20px; left: 30px; z-index: 100;
            color: rgba(255,255,255,0.7); font-size: 1.5rem; text-decoration: none;
            transition: color 0.3s;
        }
        .back-btn:hover { color: white; }

        /* --- SIMILAR MOVIES --- */
        .similar-card {
            border-radius: 4px; overflow: hidden;
            transition: transform 0.3s ease;
        }
        .similar-card:hover { transform: scale(1.1); z-index: 10; cursor: pointer; }
        .similar-img { width: 100%; border-radius: 4px; }

        @media (max-width: 768px) {
            .hero-background { display: block; height: auto; padding-bottom: 50px; background-position: center; }
            .hero-overlay { background: linear-gradient(to top, #141414 10%, rgba(20,20,20,0.8) 100%); }
            .content-wrapper { text-align: center; padding-top: 80px; }
            .description { margin: 0 auto 30px auto; }
            .meta-info { justify-content: center; }
            .btn-group-custom { justify-content: center; }
        }
    </style>
</head>
<body th:style="'--bg-image: url(' + ${movie.posterPath} + ');'">

<a href="/" class="back-btn"><i class="bi bi-arrow-left"></i> Back</a>

<div class="hero-background">
    <div class="hero-overlay"></div>

    <div class="container content-wrapper">
        <div class="row align-items-center">

            <div class="col-md-4 col-lg-3 text-center mb-4 mb-md-0">
                <img th:src="${movie.posterPath}" class="poster-image" alt="Poster">
            </div>

            <div class="col-md-8 col-lg-9">
                <h1 class="movie-title" th:text="${movie.title}">Movie Title</h1>

                <div class="meta-info">
                    <span class="match-score">98% Match</span>
                    <span class="year-badge" th:text="${#strings.substring(movie.releaseDate, 0, 4)}">2023</span>
                    <span th:text="${movie.genres}">Genres</span>
                </div>

                <p class="description" th:text="${movie.description != null ? movie.description : 'No description available for this title.'}"></p>

                <div class="d-flex gap-3 btn-group-custom">
                    <a th:href="@{/watch/{id}(id=${movie.movieId})}" class="btn-play">
                        <i class="bi bi-play-fill" style="font-size: 1.5rem;"></i> Play
                    </a>

                    <a th:if="${isFavorite}"
                       th:href="@{/mylist/remove/{id}(id=${movie.movieId})}"
                       class="btn-list">
                        <i class="bi bi-check-lg"></i> My List
                    </a>

                    <a th:unless="${isFavorite}"
                       th:href="@{/mylist/add/{id}(id=${movie.movieId})}"
                       class="btn-list">
                        <i class="bi bi-plus-lg"></i> My List
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container pb-5 mt-4">
    <h3 class="mb-4 fw-bold" style="border-left: 5px solid #e50914; padding-left: 15px;">More Like This</h3>

    <div class="row row-cols-2 row-cols-md-4 g-4">
        <div class="col" th:each="sim : ${similarMovies}">
            <div class="similar-card">
                <a th:href="@{/details/{id}(id=${sim.movieId})}">
                    <img th:src="${sim.posterPath}" class="similar-img" alt="Similar Movie">
                </a>
            </div>
            <div class="mt-2 text-center text-secondary small" th:text="${sim.title}"></div>
        </div>
    </div>

    <div th:if="${similarMovies.empty}" class="text-secondary opacity-50 ps-3">
        No similar titles found at the moment.
    </div>
</div>

</body>
</html>
