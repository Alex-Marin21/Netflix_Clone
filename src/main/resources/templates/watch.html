<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title} + ' - Watching'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; height: 100vh; overflow: hidden; }
        .back-btn { position: absolute; top: 20px; left: 30px; z-index: 100; color: white; text-decoration: none; font-size: 20px; font-weight: bold; }
        .back-btn:hover { color: #e50914; }
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        iframe { width: 80%; height: 70vh; border: none; border-radius: 8px; box-shadow: 0 0 50px rgba(229, 9, 20, 0.2); }
    </style>
</head>
<body>

<a href="/" class="back-btn">← Back to Browse</a>

<div class="video-container">
    <h2 class="mb-4" th:text="${movie.title}"></h2>

    <iframe th:if="${movie.trailerUrl != null}"
            th:src="${movie.trailerUrl}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>

    <div th:unless="${movie.trailerUrl != null}" class="text-center text-secondary">
        <h3>Ne pare rău, acest film nu are trailer disponibil momentan.</h3>
        <p>Încearcă "Under the Dome" sau "Person of Interest" pentru demo.</p>
    </div>

    <p class="mt-3 text-secondary">Now playing from your database ID: <span th:text="${movie.tmdbId}"></span></p>
</div>

</body>
</html>
