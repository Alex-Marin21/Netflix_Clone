<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title} + ' - Watching'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: white;
            height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 100;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            opacity: 0.7;
        }
        .back-btn:hover {
            color: #e50914;
            opacity: 1;
        }
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        iframe {
            width: 80%;
            height: 70vh;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

<a href="/" class="back-btn">&#8592; Back to Browse</a>

<div class="video-container">
    <h2 class="mb-4" th:text="${movie.title}">Movie Title</h2>

    <iframe th:if="${movie.trailerUrl != null}"
            th:src="${movie.trailerUrl}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>

    <div th:unless="${movie.trailerUrl != null}" class="text-center text-secondary">
        <h3 class="mb-3">Sorry, no trailer available for this movie yet.</h3>
        <p>Try "Under the Dome" or "Person of Interest" for a demo.</p>
    </div>

    <p class="mt-4 text-secondary small">Now playing from database ID: <span th:text="${movie.tmdbId}"></span></p>
</div>

</body>
</html>
