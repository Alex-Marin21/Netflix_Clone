<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lost in Space</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            /* Background image with stars/space */
            background-image: url('https://assets.nflxext.com/ffe/siteui/pages/errors/bg-lost-in-space.png');
            background-size: cover;
            background-position: center;
        }

        .error-content {
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent background */
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 600px;
        }

        h1 {
            font-size: 100px;
            font-weight: 700;
            margin: 0;
            color: #e50914; /* Netflix Red */
            text-shadow: 4px 4px 0px rgba(255,255,255,0.1);
        }

        h2 {
            font-size: 30px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .btn-home {
            background-color: white;
            color: black;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .btn-home:hover {
            background-color: #e50914;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="error-content">
    <h1>404</h1>
    <h2>Lost in Space?</h2>

    <p>Sorry, we can't find the page you are looking for. <br> It might have been swallowed by a black hole.</p>

    <a href="/" class="btn-home">Netflix Home</a>
</div>

</body>
</html>
