<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background-color:#141414;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}.card{background-color:rgba(0,0,0,0.75);padding:40px;border:none;min-width:400px;}</style>
</head>
<body>
<div class="card">
    <h3>Parolă Nouă</h3>
    <form action="/reset-password" method="post">
        <input type="hidden" name="email" th:value="${email}">
        <input type="password" name="password" class="form-control mb-3" placeholder="Noua Parolă" required minlength="6">
        <button type="submit" class="btn btn-danger w-100">Schimbă Parola</button>
    </form>
</div>
</body>
</html>
