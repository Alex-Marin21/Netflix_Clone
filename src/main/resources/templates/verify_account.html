<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Activează Contul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background-color:#141414;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}.card{background-color:rgba(0,0,0,0.75);padding:40px;border:none;min-width:400px;}</style>
</head>
<body>
<div class="card">
    <h3 class="text-center mb-3">Activează Contul</h3>
    <p class="text-secondary text-center">Ți-am trimis un cod pe email.</p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form action="/verify-account" method="post">
        <input type="hidden" name="email" th:value="${email}">

        <div class="mb-3">
            <input type="text" name="code" class="form-control text-center" placeholder="COD (6 cifre)" required style="font-size: 20px; letter-spacing: 5px;">
        </div>

        <button type="submit" class="btn btn-danger w-100">Activează</button>
    </form>
</div>
</body>
</html>
