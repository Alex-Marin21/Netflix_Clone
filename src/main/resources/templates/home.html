<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Netflix Clone - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* --- GLOBAL STYLES --- */
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar-netflix {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            background-color: #000000;
            padding: 15px 4%;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo {
            color: #e50914;
            font-weight: 800;
            font-size: 30px;
            text-decoration: none;
            letter-spacing: 1px;
            text-shadow: 0px 0px 10px rgba(229, 9, 20, 0.7);
        }

        .logo:hover { color: #ff0a16; }

        /* --- GENRE PILLS --- */
        .genre-btn {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .genre-btn:hover {
            background-color: rgba(255,255,255,0.2);
            border-color: white;
            color: white;
            transform: scale(1.05);
        }

        /* --- MOVIE CARDS --- */
        .movie-card {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-bottom: 30px;
            aspect-ratio: 2/3;
        }

        /* Hover Effect: Scale Up & Glow */
        .movie-card:hover {
            transform: scale(1.1);
            z-index: 99;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Link-ul care inveleste imaginea */
        .poster-link {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Overlay Info */
        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0.4) 60%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;

            /* TRUCUL MAGIC: */
            /* Lasam click-urile sa treaca PRIN overlay catre imagine */
            pointer-events: none;
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        /* Reactivam click-urile DOAR pentru elementele interactive din overlay */
        .interactive-content {
            pointer-events: auto; /* Titlul si butoanele devin clicabile */
        }

        .card-title {
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            margin-bottom: 8px;
            line-height: 1.2;
            color: white;
            text-decoration: none;
            display: block;
            white-space: normal; /* Permite textului lung sa treaca pe randul urmator */
        }

        .card-title:hover { color: #e5e5e5; }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: transform 0.2s;
            text-decoration: none;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.6);
            z-index: 102;
        }

        .action-btn:hover {
            transform: scale(1.2);
            background: white;
            border-color: white;
        }

        .btn-add { color: white; }
        .btn-add:hover { color: black; }

        .btn-remove { color: #46d369; border-color: #46d369; }
        .btn-remove:hover { background: #46d369; color: black; }

        /* --- SECTION TITLE --- */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 30px 0 15px 0;
            color: #e5e5e5;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-netflix">
    <div class="container-fluid">
        <a class="logo" href="/">NETFLIX CLONE</a>

        <div class="d-flex align-items-center gap-3">

            <form action="/search" method="get" class="d-flex" role="search">
                <input class="form-control form-control-sm bg-dark text-white border-secondary me-2"
                       style="background-color: rgba(0,0,0,0.7) !important;"
                       type="search" name="query" placeholder="Search titles..."
                       aria-label="Search" th:value="${lastQuery}">
            </form>

            <div sec:authorize="!isAuthenticated()">
                <a href="/login" class="btn btn-sm btn-danger fw-bold px-3">Sign In</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="d-flex gap-3 align-items-center">
                <a href="/mylist" class="btn btn-sm text-white fw-bold">My List</a>

                <span class="text-white small d-none d-md-block opacity-75">
                    Hello, <span sec:authentication="name" class="fw-bold text-white">User</span>
                </span>

                <a sec:authorize="hasRole('ADMIN')" href="/admin" class="btn btn-sm btn-warning fw-bold text-dark px-2">
                    ADMIN
                </a>

                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-outline-light px-3">Exit</button>
                </form>
            </div>

        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4 d-flex justify-content-center flex-wrap gap-2">
    <a href="/" class="btn btn-sm rounded-pill px-3 genre-btn">All Movies</a>
    <a href="/genre/Action" class="btn btn-sm rounded-pill px-3 genre-btn">Action</a>
    <a href="/genre/Comedy" class="btn btn-sm rounded-pill px-3 genre-btn">Comedy</a>
    <a href="/genre/Drama" class="btn btn-sm rounded-pill px-3 genre-btn">Drama</a>
    <a href="/genre/Horror" class="btn btn-sm rounded-pill px-3 genre-btn">Horror</a>
    <a href="/genre/Science-Fiction" class="btn btn-sm rounded-pill px-3 genre-btn">Sci-Fi</a>
    <a href="/genre/Thriller" class="btn btn-sm rounded-pill px-3 genre-btn">Thriller</a>
</div>

<div class="container-fluid px-5 pb-5">
    <h4 class="section-title" th:text="${pageTitle}">Popular on Netflix</h4>

    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-3">
        <div class="col" th:each="movie : ${movies}">

            <div class="movie-card">
                <a th:href="@{/details/{id}(id=${movie.movieId})}" class="poster-link">
                    <img th:src="${movie.posterPath}" class="poster-img" alt="Poster">
                </a>

                <div class="card-overlay">
                    <div class="d-flex justify-content-between align-items-end h-100 p-2">

                        <div class="interactive-content" style="width: 75%;">
                            <a th:href="@{/details/{id}(id=${movie.movieId})}" style="text-decoration:none;">
                                <span class="card-title" th:text="${movie.title}">Movie Title</span>
                            </a>
                            <span class="badge bg-danger" th:text="${movie.rating != null ? movie.rating : 'N/A'}">8.5</span>
                        </div>

                        <div sec:authorize="isAuthenticated()" class="interactive-content">
                            <a th:if="${favorites != null and #sets.contains(favorites, movie)}"
                               th:href="@{/mylist/remove/{id}(id=${movie.movieId})}"
                               class="action-btn btn-remove"
                               title="Remove from My List">
                                ✓
                            </a>

                            <a th:unless="${favorites != null and #sets.contains(favorites, movie)}"
                               th:href="@{/mylist/add/{id}(id=${movie.movieId})}"
                               class="action-btn btn-add"
                               title="Add to My List">
                                +
                            </a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div th:if="${movies.empty}" class="text-center mt-5 opacity-50">
        <div class="spinner-border text-danger mb-3" role="status"></div>
        <h4>Loading movies from database...</h4>
    </div>
</div>

</body>
</html>
