<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My List - Netflix Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .navbar-netflix {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 15px 4%;
        }
        .logo {
            color: #e50914;
            font-weight: bold;
            font-size: 28px;
            text-decoration: none;
        }

        /* CARDUL DE FILM */
        .movie-card {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .poster-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* OVERLAY */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        /* Butoane rotunde */
        .btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s;
            border: 2px solid white;
            background-color: rgba(40, 40, 40, 0.8);
            color: white;
            text-decoration: none;
            cursor: pointer;
        }

        .btn-circle:hover {
            background-color: white;
            color: black;
            transform: scale(1.1);
        }

        .btn-play {
            border-color: #e50914;
        }
        .btn-play:hover {
            background-color: #e50914;
            color: white;
            border-color: #e50914;
        }

        .empty-list-msg {
            color: #666;
            margin-top: 50px;
            font-size: 1.2rem;
        }

        /* MODAL STYLES (Dark Mode) */
        .modal-content {
            background-color: #1f1f1f;
            color: white;
            border: 1px solid #333;
        }
        .modal-header { border-bottom: 1px solid #333; }
        .modal-footer { border-top: 1px solid #333; }
        .btn-close-white { filter: invert(1); }
    </style>
</head>
<body>

<nav class="navbar navbar-netflix sticky-top">
    <div class="container-fluid">
        <a class="logo" href="/">NETFLIX CLONE</a>
        <a href="/" class="btn btn-sm btn-outline-light">Back to Home</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4 fw-bold">My List</h2>

    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3">
        <div class="col" th:each="movie : ${movies}">
            <div class="movie-card">
                <img th:src="${movie.posterPath}" class="poster-img" alt="Movie Poster">

                <div class="card-overlay">
                    <a th:href="@{/details/{id}(id=${movie.movieId})}"
                       class="btn-circle btn-play"
                       title="Play Movie">
                        <i class="fas fa-play"></i>
                    </a>

                    <a href="#"
                       class="btn-circle"
                       data-bs-toggle="modal"
                       data-bs-target="#removeModal"
                       th:onclick="'setRemoveId(' + ${movie.movieId} + ')'"
                       title="Remove from List">
                        <i class="fas fa-times"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${movies.empty}" class="text-center empty-list-msg">
        <p>Lista ta este goala.</p>
        <a href="/" class="btn btn-outline-light mt-2">Exploreaza Filme</a>
    </div>
</div>

<div class="modal fade" id="removeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Elimina din Lista</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Esti sigur ca vrei sa scoti acest film din lista ta?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Nu, Anuleaza</button>

                <form id="removeForm" method="get" action="">
                    <button type="submit" class="btn btn-danger">Da, Elimina</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function setRemoveId(movieId) {
        var form = document.getElementById('removeForm');
        // Seteaza actiunea formularului catre URL-ul corect de stergere
        form.action = '/mylist/remove/' + movieId;
    }
</script>

</body>
</html>
