<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; }
        .movie-card { margin-bottom: 30px; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .poster-img { width: 100%; border-radius: 4px; }
        .navbar-netflix { background-color: black; padding: 15px 30px; }
        .logo { color: #e50914; font-weight: bold; font-size: 28px; text-decoration: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-netflix">
    <div class="container-fluid">
        <a class="logo" href="/">NETFLIX CLONE</a>
        <a href="/" class="btn btn-sm btn-outline-light">Back to Home</a>
    </div>
</nav>

<div class="container mt-4">
    <h3>My List</h3>
    <div class="row mt-4">

        <div class="col-6 col-md-3 col-lg-2" th:each="movie : ${movies}">
            <div class="movie-card">
                <img th:src="${movie.posterPath}" class="poster-img">
                <div class="mt-2 text-center">
                    <a th:href="@{/mylist/remove/{id}(id=${movie.movieId})}" class="btn btn-sm btn-danger w-100">
                        Remove
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${movies.empty}" class="text-center mt-5">
            <p class="text-secondary">Lista ta este goală. Adaugă filme de pe Homepage!</p>
        </div>

    </div>
</div>

</body>
</html>
