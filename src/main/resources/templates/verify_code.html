<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflix - Verify Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6d7434e-d6de-4185-a6d4-c77a2d08737b/RO-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .logo {
            margin-top: 25px;
            margin-left: 50px;
            color: #e50914;
            font-weight: 800;
            font-size: 40px;
            text-decoration: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            position: absolute;
            top: 0;
            left: 0;
        }

        .container-center {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-netflix {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px 68px 40px;
            border-radius: 4px;
            min-width: 450px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        .help-text {
            color: #b3b3b3;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* Input special pentru COD (Mare si distantat) */
        .form-control-code {
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            height: 60px;
            font-size: 28px;
            letter-spacing: 12px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .form-control-code:focus {
            background: #454545;
            color: white;
            box-shadow: none;
            outline: none;
            border-bottom: 3px solid #e50914;
        }

        .form-control-code::placeholder {
            color: #555;
            letter-spacing: 2px;
            font-size: 16px;
            font-weight: normal;
            vertical-align: middle;
        }

        .btn-netflix {
            background-color: #e50914;
            color: white;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            padding: 16px;
            margin-top: 24px;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-netflix:hover {
            background-color: #f40612;
        }
    </style>
</head>
<body>

<a href="/" class="logo">NETFLIX CLONE</a>

<div class="container-center">
    <div class="card-netflix">
        <h2>Security Check</h2>
        <p class="help-text">
            For your security, please verify your identity.<br>
            Enter the code sent to <strong>your email</strong>.
        </p>

        <div th:if="${error}" class="alert alert-danger" style="background: #e87c03; border: none; color: white;">
            <span th:text="${error}"></span>
        </div>

        <form action="/verify-code" method="post">
            <input type="hidden" name="email" th:value="${email}">

            <div class="mb-3">
                <input type="text" name="code" class="form-control form-control-code"
                       placeholder="XXXXXX" required maxlength="6" autofocus>
            </div>

            <button type="submit" class="btn btn-netflix">Verify Code</button>
        </form>

        <div class="mt-4">
            <a href="/login" class="text-secondary small text-decoration-none">Back to Login</a>
        </div>
    </div>
</div>

</body>
</html>
