<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background-color:#141414;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}.card{background-color:rgba(0,0,0,0.75);padding:40px;border:none;min-width:400px;}</style>
</head>
<body>
<div class="card">
    <h3>Verificare Cod</h3>
    <p class="text-secondary">Introdu codul primit pe email.</p>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form action="/verify-code" method="post">
        <input type="hidden" name="email" th:value="${email}">
        <input type="text" name="code" class="form-control mb-3" placeholder="Cod (6 cifre)" required>
        <button type="submit" class="btn btn-danger w-100">Verifică</button>
    </form>
</div>
</body>
</html>
