<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflix - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fundal stil Netflix Login */
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6d7434e-d6de-4185-a6d4-c77a2d08737b/US-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover;
            background-position: center;
            background-color: #141414;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .logo {
            position: absolute;
            top: 25px;
            left: 40px;
            color: #e50914;
            font-size: 35px;
            font-weight: bold;
            text-decoration: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .login-card {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px 68px 40px;
            border-radius: 4px;
            min-width: 450px;
            min-height: 500px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h2 {
            font-weight: 700;
            margin-bottom: 28px;
            font-size: 32px;
        }

        .form-control-netflix {
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            height: 50px;
            padding: 16px 20px;
            font-size: 16px;
        }

        .form-control-netflix:focus {
            background: #454545;
            color: white;
            box-shadow: none;
            outline: none;
        }

        .form-control-netflix::placeholder {
            color: #8c8c8c;
        }

        .btn-netflix {
            background-color: #e50914;
            color: white;
            font-weight: 700;
            font-size: 16px;
            border-radius: 4px;
            padding: 16px;
            margin-top: 24px;
            transition: background 0.2s;
            border: none;
        }

        .btn-netflix:hover {
            background-color: #f40612;
        }

        .help-text {
            color: #737373;
            font-size: 16px;
            margin-top: 16px;
        }

        .help-text a {
            color: white;
            text-decoration: none;
        }
        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<a href="/" class="logo">NETFLIX CLONE</a>

<div class="login-card">
    <h2>Reset Password</h2>

    <p style="color: #b3b3b3; font-size: 1rem; margin-bottom: 30px;">
        Enter the email address associated with your account and we'll send you a verification code.
    </p>

    <div th:if="${error}" class="alert alert-danger" style="background: #e87c03; border: none; color: white;" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-3">
            <input type="email" name="email" class="form-control form-control-netflix" placeholder="Email Address" required>
        </div>

        <button type="submit" class="btn btn-netflix w-100">Email Me</button>
    </form>

    <div class="mt-4 help-text">
        Remembered your password? <a href="/login">Sign In now</a>.
    </div>
</div>

</body>
</html>
