<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background-color:#141414;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}.card{background-color:rgba(0,0,0,0.75);padding:40px;border:none;min-width:400px;}</style>
</head>
<body>
<div class="card">
    <h3>Resetare Parolă</h3>
    <p class="text-secondary">Introdu email-ul contului tău.</p>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post">
        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
        <button type="submit" class="btn btn-danger w-100">Trimite Cod</button>
    </form>
</div>
</body>
</html>
