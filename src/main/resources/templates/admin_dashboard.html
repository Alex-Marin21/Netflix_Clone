<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Netflix Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .navbar-netflix { background-color: black; padding: 15px 30px; }
        .logo { color: #e50914; font-weight: bold; font-size: 28px; text-decoration: none; }

        .card-admin { background-color: #1f1f1f; border: none; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .table-dark { background-color: #1f1f1f; color: #b3b3b3; }
        .table-dark th { color: white; border-bottom: 2px solid #333; }
        .table-dark td { border-bottom: 1px solid #333; vertical-align: middle; }

        .badge-admin { background-color: #e50914; color: white; }
        .badge-user { background-color: #333; color: #ccc; border: 1px solid #555; }
    </style>
</head>
<body>

<nav class="navbar navbar-netflix mb-4">
    <div class="container-fluid">
        <a class="logo" href="/">NETFLIX ADMIN</a>
        <a href="/" class="btn btn-outline-light btn-sm">Back to Site</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">User Management</h2>

    <div th:if="${param.deleted}" class="alert alert-warning">
        Utilizatorul a fost sters cu succes!
    </div>

    <div class="card card-admin p-4">
        <table class="table table-dark table-hover mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.userId}"></td>
                <td th:text="${user.username}" class="fw-bold text-white"></td>
                <td th:text="${user.email}"></td>

                <td>
                    <span th:if="${user.role == 'ADMIN'}" class="badge badge-admin px-3 py-2">ADMIN</span>
                    <span th:unless="${user.role == 'ADMIN'}" class="badge badge-user px-3 py-2">USER</span>
                </td>

                <td>
                    <span th:if="${user.enabled}" class="text-success">Active</span>
                    <span th:unless="${user.enabled}" class="text-danger">Inactive</span>
                </td>

                <td>
                    <form th:action="@{/admin/delete/{id}(id=${user.userId})}" method="post"
                          onsubmit="return confirm('Sigur vrei sa stergi acest utilizator?');">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
